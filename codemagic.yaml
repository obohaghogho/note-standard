workflows:

  # ─────────────────────────────────────────────────────────────
  # Android — Release APK + AAB
  # ─────────────────────────────────────────────────────────────
  android-release:
    name: Android Release Build
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      android_signing:
        - notestandard_keystore
      vars:
        PACKAGE_NAME: "com.notestandard.app"
      node: 20.17.0

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      # 1. Install root monorepo dependencies
      - name: Install root dependencies
        script: |
          npm install --legacy-peer-deps

      # 2. Install mobile package dependencies
      - name: Install mobile dependencies
        script: |
          cd mobile
          npm install --legacy-peer-deps

      # 3. Inject environment secrets into .env so the app picks them up at build time
      - name: Write .env file
        script: |
          cd mobile
          printf "EXPO_PUBLIC_SUPABASE_URL=%s\n" "$EXPO_PUBLIC_SUPABASE_URL" > .env
          printf "EXPO_PUBLIC_SUPABASE_ANON_KEY=%s\n" "$EXPO_PUBLIC_SUPABASE_ANON_KEY" >> .env
          printf "EXPO_PUBLIC_GATEWAY_URL=%s\n" "$EXPO_PUBLIC_GATEWAY_URL" >> .env
          printf "EXPO_PUBLIC_API_URL=%s\n" "$EXPO_PUBLIC_API_URL" >> .env

      # 4. Build signed release APK
      - name: Build Android APK (Release)
        script: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PsignKey.storeFile="$CM_KEYSTORE_PATH" \
            -PsignKey.storePassword="$CM_KEYSTORE_PASSWORD" \
            -PsignKey.keyAlias="$CM_KEY_ALIAS" \
            -PsignKey.keyPassword="$CM_KEY_PASSWORD" \
            --no-daemon \
            --stacktrace

      # 5. Also build AAB for Play Store upload
      - name: Build Android AAB (Play Store)
        script: |
          cd mobile/android
          ./gradlew bundleRelease \
            -PsignKey.storeFile="$CM_KEYSTORE_PATH" \
            -PsignKey.storePassword="$CM_KEYSTORE_PASSWORD" \
            -PsignKey.keyAlias="$CM_KEY_ALIAS" \
            -PsignKey.keyPassword="$CM_KEY_PASSWORD" \
            --no-daemon

    artifacts:
      # Direct-install APK
      - mobile/android/app/build/outputs/apk/release/*.apk
      # Play Store bundle
      - mobile/android/app/build/outputs/bundle/release/*.aab
      # Build logs for debugging
      - mobile/android/app/build/outputs/logs/**

    publishing:
      email:
        recipients:
          - obohaghogho@gmail.com
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────
  # iOS — Release IPA (requires Apple Developer Program account)
  # ─────────────────────────────────────────────────────────────
  ios-release:
    name: iOS Release Build
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.notestandard.app
      vars:
        BUNDLE_ID: "com.notestandard.app"
        XCODE_WORKSPACE: "mobile/ios/NoteStandard.xcworkspace"
        XCODE_SCHEME: "NoteStandard"
      node: 20.17.0

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install root dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Install mobile dependencies
        script: |
          cd mobile
          npm install --legacy-peer-deps

      - name: Write .env file
        script: |
          cd mobile
          printf "EXPO_PUBLIC_SUPABASE_URL=%s\n" "$EXPO_PUBLIC_SUPABASE_URL" > .env
          printf "EXPO_PUBLIC_SUPABASE_ANON_KEY=%s\n" "$EXPO_PUBLIC_SUPABASE_ANON_KEY" >> .env
          printf "EXPO_PUBLIC_GATEWAY_URL=%s\n" "$EXPO_PUBLIC_GATEWAY_URL" >> .env
          printf "EXPO_PUBLIC_API_URL=%s\n" "$EXPO_PUBLIC_API_URL" >> .env

      - name: Install CocoaPods
        script: |
          cd mobile/ios
          pod install --repo-update

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - obohaghogho@gmail.com
        notify:
          success: true
          failure: true
