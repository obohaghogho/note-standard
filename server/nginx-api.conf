# ─── NGINX Config for api.notestandard.com ────────────────────
# PURPOSE: SSL termination + reverse proxy to Express.
# RULE: Do NOT add any CORS headers here — Express handles all CORS.
#       Adding them in NGINX causes duplicate headers which break browsers.

# Map for WebSocket Upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl http2;
    server_name api.notestandard.com;

    # ── SSL ──
    ssl_certificate     /etc/letsencrypt/live/api.notestandard.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.notestandard.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Proxy to Express ──
    location / {
        proxy_pass http://127.0.0.1:5000;

        # Forward real client info
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Disable buffering for real-time traffic
        proxy_buffering off;
        proxy_request_buffering off;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    server_name api.notestandard.com;
    return 301 https://$host$request_uri;
}
